name: Atualiza precos (stocks)
on:
  schedule:
    - cron: "*/15 12-22 * * 1-5"
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: atualiza-precos
  cancel-in-progress: false
jobs:
  precos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Gera precos.js
        run: node gera_precos.mjs
      - name: Commita se mudou
        run: |
          if [ -n "$(git status --porcelain precos.js)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add precos.js
            git commit -m "chore: atualiza precos.js [skip ci]"
            git push
          fi
