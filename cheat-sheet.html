<style>
  :root{--ink:#2b2b2b;--bg:#fff;--muted:#8a8a8a;--line:#e6e6e6;--orange:#EC7000;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,Helvetica,sans-serif;background:#f3f4f6;color:var(--ink)}
  header{background:#fff;border-bottom:3px solid var(--orange);padding:16px 30px}
  .ttl h1{font-size:20px;font-weight:800;letter-spacing:.3px}
  .ttl .sub{font-size:12px;color:var(--muted);margin-top:3px}
  main{max-width:1180px;margin:0 auto;padding:18px 22px}
  .bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:14px}
  .legend{display:flex;gap:8px;flex-wrap:wrap}
  .chip{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:5px 12px;font-size:13px;cursor:pointer;user-select:none}
  .chip .dot{width:11px;height:11px;border-radius:2px}.chip.off{opacity:.35}
  .right{display:flex;gap:8px;align-items:center}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:none;background:#fff;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--orange);color:#fff}
  .btn{background:var(--orange);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer}
  .tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
  .tab{padding:9px 16px;cursor:pointer;font-weight:700;font-size:13px;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px}
  .tab.active{color:var(--orange);border-bottom-color:var(--orange)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .panel{display:none}.panel.active{display:block}
  .card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px 14px 8px}
  .card.full{grid-column:1/-1}
  .card h3{font-size:13px;font-weight:700;text-align:center;margin-bottom:6px}
  .card .wrap{position:relative;height:240px}
  .card .src{font-size:10px;color:var(--muted);margin-top:6px}
  /* tabela */
  .tblwrap{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:auto;max-height:74vh}
  table{border-collapse:collapse;font-size:12px;white-space:nowrap}
  th,td{padding:4px 9px;text-align:right;border-bottom:1px solid #f0f0f0}
  thead th{position:sticky;top:0;background:#11243d;color:#fff;font-weight:700;z-index:3;text-align:right}
  thead th.lbl{text-align:left;left:0;z-index:4;min-width:150px}
  td.lbl,th.rowlbl{position:sticky;left:0;background:#fff;text-align:left;font-weight:600;z-index:2}
  tr.sec td.lbl{background:#11243d}
  tr.sec td{background:#11243d;font-weight:800;color:#fff;text-transform:uppercase;font-size:11px;letter-spacing:.3px}
  tr.metric td{background:#eef2f7;font-weight:700;color:#11243d}
  tr.metric td.lbl{background:#eef2f7}
  td.co{padding-left:20px;color:#444;font-weight:500}
  td.co .dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:6px;vertical-align:middle}
  tbody tr:hover td:not(.lbl){background:#fff7ef}
  @media(max-width:880px){.grid{grid-template-columns:1fr}}
</style>

      return {label:co,data:d,borderColor:COLORS[co],backgroundColor:COLORS[co],
        borderWidth:2.2,pointRadius:d.map((v,j)=>v==null?0:(j===last?4:2.8)),pointHoverRadius:5,tension:.2,spanGaps:false,
        datalabels:{display:c=>c.dataIndex===last,anchor:'end',align:'right',offset:4,clamp:true,color:COLORS[co],font:{size:10,weight:700},formatter:v=>ff(v)}};});
    charts[key]=new Chart(cv,{type:'line',data:{labels,datasets:ds},options:opts(ff,true)});
  }else if(type==='bar'){
    const i=Q.length-1;const vals=cos.map(co=>S[key][co][i]);
    const yoy=cos.map(co=>{const a=S[key][co];return(a[i]!=null&&a[i-4]!=null&&a[i-4]!=0)?a[i]/a[i-4]-1:null;});
    charts[key]=new Chart(cv,{type:'bar',data:{labels:cos,datasets:[{data:vals,backgroundColor:cos.map(c=>COLORS[c]),yoy:yoy,
      datalabels:{labels:{
        val:{display:true,anchor:'end',align:'top',offset:2,color:'#333',font:{size:12,weight:700},formatter:v=>ff(v)},
        yo:{display:true,anchor:'end',align:'top',offset:20,font:{size:10,weight:700},
            formatter:(v,c)=>{const y=c.dataset.yoy[c.dataIndex];return y==null?'':(y>=0?'+':'')+(y*100).toFixed(1)+'%';},
            color:c=>{const y=c.dataset.yoy[c.dataIndex];return y==null?'#999':(y>=0?'#0a8f3c':'#d42a2a');}}
      }}}]},options:opts(ff,false,true)});
  }else if(type==='barq'){
    const ds=cos.map(co=>({label:co,data:ix.map(i=>S[key][co][i]),backgroundColor:COLORS[co],
      datalabels:{display:showLabels,anchor:'end',align:'top',color:COLORS[co],font:{size:8,weight:700},rotation:-90,formatter:v=>ff(v)}}));
    charts[key]=new Chart(cv,{type:'bar',data:{labels,datasets:ds},options:opts(ff,true)});
  }else if(type==='stack'){
    const showL=ix.length<=10;
    const totAt=i=>cos.reduce((s,co)=>s+((S[key][co][i])||0),0);
    const tot=ix.map(i=>totAt(i));
    const yy=ix.map(i=>{const p=i-4;return (p>=0 && totAt(p)>0)?totAt(i)/totAt(p)-1:null;});
    const ds=cos.map(co=>({label:co,data:ix.map(i=>S[key][co][i]),backgroundColor:COLORS[co],stack:'s',datalabels:{display:false}}));
    ds.push({label:'Total',data:ix.map(()=>0),backgroundColor:'rgba(0,0,0,0)',stack:'s',datalabels:{labels:{
      tot:{display:showL,anchor:'end',align:'top',offset:1,color:'#11243d',font:{size:11,weight:700},formatter:(v,c)=>fN(tot[c.dataIndex])},
      yo:{display:showL,anchor:'end',align:'top',offset:17,font:{size:9,weight:700},
        formatter:(v,c)=>{const y=yy[c.dataIndex];return y==null?'':(y>=0?'+':'')+(y*100).toFixed(1)+'%';},
        color:c=>{const y=yy[c.dataIndex];return y==null?'#999':(y>=0?'#0a8f3c':'#d42a2a');}}}}});
    charts[key]=new Chart(cv,{type:'bar',data:{labels,datasets:ds},
      options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:34,right:20}},interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:true,position:'bottom',labels:{boxWidth:10,boxHeight:10,font:{size:11},usePointStyle:true,filter:it=>it.text!=='Total'}},
          datalabels:{display:false},tooltip:{filter:it=>it.dataset.label!=='Total',callbacks:{label:c=>c.dataset.label+': '+fN(c.parsed.y)}}},
        scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:10}}},y:{stacked:true,grid:{color:'#f0f0f0'},ticks:{callback:v=>fN(v),font:{size:10}}}}}});
  }
}
function opts(ff,legend,noY){return{responsive:true,maintainAspectRatio:false,layout:{padding:{top:noY?34:22,right:34}},
  interaction:{mode:'index',intersect:false},
  plugins:{legend:{display:legend,position:'bottom',labels:{boxWidth:10,boxHeight:10,font:{size:11},usePointStyle:true}},
    datalabels:{display:false},tooltip:{enabled:!noY,callbacks:{label:c=>c.dataset.label+': '+ff(c.parsed.y)}}},
  scales:{x:{grid:{display:false},ticks:{font:{size:10}}},
    y:{display:!noY,grid:{color:'#f0f0f0'},ticks:{callback:v=>ff(v),font:{size:10}}}}};}
function refresh(){Object.values(charts).forEach(c=>c.destroy());for(const k in charts)delete charts[k];
  const act=document.querySelector('.panel.active');if(act&&act.id==='tbl'){renderTable();return;}
  TABS.forEach(t=>{if(document.getElementById(t.id).classList.contains('active'))t.charts.forEach(([key,,type])=>build(key,type));});}

function renderTable(){
  const ix=Q.map((_,i)=>i);let h='<table><thead><tr><th class="lbl">Métrica / Empresa</th>';
  ix.forEach(i=>h+=`<th>${Q[i]}</th>`);h+='</tr></thead><tbody>';
  TABLE_GROUPS.forEach(([sec,keys])=>{
    h+=`<tr class="sec"><td class="lbl">${sec}</td>${ix.map(()=>'<td></td>').join('')}</tr>`;
    keys.forEach(k=>{
      const ff=FF[fmtOf(k)];
      h+=`<tr class="metric"><td class="lbl">${LABELS[k]}</td>${ix.map(()=>'<td></td>').join('')}</tr>`;
      CO.forEach(co=>{
        if(!active[co])return;
        h+=`<tr><td class="lbl co"><span class="dot" style="background:${COLORS[co]}"></span>${co}</td>`;
        ix.forEach(i=>{const v=S[k][co][i];h+=`<td>${v==null?'–':ff(v)}</td>`;});
        h+='</tr>';
      });
    });
  });
  h+='</tbody></table>';document.getElementById('tblwrap').innerHTML=h;
}
refresh();

function postHeight(){try{parent.postMessage({type:'cheatsheet-height',height:Math.ceil(document.body.scrollHeight)},'*');}catch(e){}}
if(window.ResizeObserver){new ResizeObserver(postHeight).observe(document.body);}
window.addEventListener('load',postHeight);window.addEventListener('resize',postHeight);

function downloadCSV(){const keys=Object.keys(S);let rows=[['Metrica','Empresa',...Q].join(';')];
  keys.forEach(k=>CO.forEach(co=>rows.push([k,co,...S[k][co].map(v=>v==null?'':String(v).replace('.',','))].join(';'))));
  const blob=new Blob(['﻿'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='car_rental_base_'+Q[Q.length-1]+'.csv';a.click();}
</script>
